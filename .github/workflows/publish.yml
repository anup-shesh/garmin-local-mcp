# Publish to PyPI on release tag push (v*), using PyPI Trusted Publishing
# (OIDC). No API token secrets are stored in the repo.
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   project:     garmin-local-mcp
#   owner:       anup-shesh
#   repository:  garmin-local-mcp
#   workflow:    publish.yml
#   environment: pypi
#
# Also create a GitHub environment named "pypi" in the repo settings
# (optionally with required reviewers for an extra approval gate).

name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Required for PyPI Trusted Publishing (OIDC token exchange).
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
